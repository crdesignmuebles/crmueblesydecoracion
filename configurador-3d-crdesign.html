<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Configurador 3D — CR Design Muebles</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--acc:#C4A46B;--bg:#16140F;--panel:#1A1814;--border:#2A2620;--muted:#6B685F;--cream:#F7F4EE;--green:#25D366}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--cream);overflow:hidden;height:100vh}
header{height:50px;background:#100E0A;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 14px}
.logo{font-family:'Playfair Display',serif;font-size:15px;color:var(--cream);text-decoration:none}
.logo span{color:var(--acc)}
.hb{padding:6px 11px;font-size:10px;border-radius:2px;cursor:pointer;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.hb-g{background:transparent;color:var(--muted);border:1px solid var(--border)}
.hb-w{background:var(--green);color:#fff}
.hb-a{background:var(--acc);color:#1E1C18}
.layout{display:flex;height:calc(100vh - 50px)}
.lpanel{width:280px;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:12px}
.viewport{flex:1;position:relative}
.rpanel{width:220px;background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;padding:12px}
@media(max-width:700px){.lpanel{width:100%;max-height:40%}.rpanel{display:none}}
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:12px}
.tab{flex:1;padding:8px;font-size:9px;text-align:center;color:var(--muted);cursor:pointer}
.tab.active{color:var(--acc);border-bottom:2px solid var(--acc)}
.pane{display:none}
.pane.active{display:block}
.sec{margin-bottom:16px}
.shd{font-size:9px;color:#3A3630;margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:4px}
.dim-row{display:flex;gap:7px;margin-bottom:7px;align-items:center}
.dim-row label{font-size:10px;color:var(--muted);width:46px}
.diw{flex:1;position:relative}
.di{width:100%;padding:6px 26px 6px 8px;background:#242018;border:1px solid #3A3630;border-radius:3px;color:var(--cream)}
.du{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:9px;color:#4A4740}
.col-list{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.ci{background:#242018;border:1px solid var(--border);border-radius:3px;padding:7px;display:flex;gap:5px;align-items:center;cursor:pointer}
.ci.sel{border-color:var(--acc)}
.clbl{flex:1;font-size:10px}
.cwi{width:50px;padding:3px;background:#1A1814;border:1px solid #3A3630;border-radius:2px;color:var(--acc);text-align:center}
.cdel{background:transparent;border:none;color:#4A3030;cursor:pointer;font-size:14px}
.add-btn{width:100%;padding:6px;background:transparent;border:1px dashed #3A3630;border-radius:3px;color:var(--muted);cursor:pointer}
.mod-item{background:#242018;border:1px solid var(--border);border-radius:3px;margin-bottom:6px;padding:8px;cursor:grab}
.mod-header{display:flex;justify-content:space-between;margin-bottom:5px}
.mod-name{font-size:11px;color:var(--acc)}
.mod-del{background:transparent;border:none;color:#4A3030;cursor:pointer}
.mod-controls{display:flex;gap:5px;margin-top:5px}
.mod-controls select{flex:1;background:#1A1814;border:1px solid #3A3630;color:var(--cream);padding:3px}
.mod-controls button{background:var(--acc);border:none;border-radius:2px;padding:3px 6px;cursor:pointer}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.fb{padding:6px;background:#242018;border:1px solid var(--border);border-radius:3px;color:var(--muted);cursor:pointer;text-align:center}
.fb.active{background:rgba(196,164,107,0.12);color:var(--acc);border-color:var(--acc)}
.cgrid{display:flex;flex-wrap:wrap;gap:5px}
.sw{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.sw.active{outline:2px solid var(--acc);outline-offset:1px}
#c3{width:100%;height:100%;display:block}
.vctrl{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:3px;background:rgba(0,0,0,0.7);border-radius:4px;padding:3px}
.vc{padding:4px 9px;font-size:9px;background:transparent;color:var(--muted);border:none;cursor:pointer}
.vc.active{color:var(--acc)}
.hint{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);font-size:7px;color:#3A3630;white-space:nowrap}
.mob-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:#100E0A;padding:8px;gap:6px}
@media(max-width:700px){.mob-bar{display:flex}.hint{display:none}}
.mob-bar button{flex:1;padding:10px;font-size:10px;border:none;border-radius:3px}
.mb-wa{background:var(--green);color:#fff}
.mb-em{background:var(--acc);color:#1E1C18}
.mb-pdf{background:#242018;color:var(--cream);border:1px solid var(--border)}
.sblock{background:#100E0A;border:1px solid var(--border);border-radius:3px;padding:10px;margin-bottom:11px}
.stitle{font-size:8px;color:var(--acc);margin-bottom:6px}
.sr{display:flex;justify-content:space-between;padding:3px 0;font-size:10px;border-bottom:1px solid var(--border)}
.sk{color:var(--muted)}.sv{color:var(--cream)}
.ctas{display:flex;flex-direction:column;gap:5px}
.bwa,.bem,.bpdf{padding:10px;font-size:10px;border:none;border-radius:3px;cursor:pointer}
.bwa{background:var(--green);color:#fff}
.bem{background:var(--acc);color:#1E1C18}
.bpdf{background:#242018;color:var(--cream);border:1px solid var(--border)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:600;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#1E1C18;border:1px solid #3A3630;width:90%;max-width:360px;border-radius:4px}
.mhd{background:#100E0A;padding:12px;display:flex;justify-content:space-between}
.mbdy{padding:12px}
.mcfg{background:#100E0A;border:1px solid var(--border);padding:6px;font-size:9px;margin-bottom:10px;white-space:pre-wrap;max-height:80px;overflow:auto}
.fld{margin-bottom:8px}
.fld label{font-size:8px;color:var(--muted);display:block}
.fld input,.fld textarea{width:100%;padding:6px;background:#100E0A;border:1px solid var(--border);color:var(--cream)}
.mact{display:flex;gap:6px;margin-top:8px}
.mact button{flex:1;padding:8px}
.mbc{background:transparent;border:1px solid var(--border);color:var(--muted)}
.mbs{background:var(--acc);border:none;color:#1E1C18}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#100E0A;border:1px solid var(--acc);padding:8px 16px;border-radius:3px;font-size:11px;opacity:0;transition:0.3s;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">CR <span>Design</span> Muebles</a>
  <div class="hbtns">
    <a class="hb hb-g" href="index.html">← Volver</a>
    <button class="hb hb-w" onclick="openWA()">WhatsApp</button>
    <button class="hb hb-a" onclick="openModal()">✉ Cita</button>
  </div>
</header>

<div class="layout">
  <div class="lpanel">
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('dims',this)">Medidas</div>
      <div class="tab" onclick="switchTab('cols',this)">Columnas</div>
      <div class="tab" onclick="switchTab('mods',this)">Módulos</div>
      <div class="tab" onclick="switchTab('mats',this)">Material</div>
    </div>

    <div class="pane active" id="pane-dims">
      <div class="sec">
        <div class="shd">Dimensiones</div>
        <div class="dim-row"><label>Alto</label><div class="diw"><input class="di" type="number" id="inH" value="220" min="150" max="300"><span class="du">cm</span></div></div>
        <div class="dim-row"><label>Fondo</label><div class="diw"><input class="di" type="number" id="inD" value="60" min="30" max="80"><span class="du">cm</span></div></div>
        <div class="dim-row"><label>Ancho</label><div class="diw"><input class="di" type="text" id="inW" readonly><span class="du">cm</span></div></div>
      </div>
      <div class="sec">
        <div class="shd">Puertas</div>
        <div class="fgrid" id="dtypes">
          <button class="fb active" data-v="correderas">Correderas</button>
          <button class="fb" data-v="abatibles">Abatibles</button>
          <button class="fb" data-v="espejo">Espejo</button>
          <button class="fb" data-v="cristal">Cristal</button>
          <button class="fb" data-v="sin">Sin puerta</button>
        </div>
      </div>
    </div>

    <div class="pane" id="pane-cols">
      <div class="sec">
        <div class="shd">Columnas</div>
        <div class="col-list" id="colList"></div>
        <button class="add-btn" onclick="addCol()">+ Añadir columna</button>
      </div>
    </div>

    <div class="pane" id="pane-mods">
      <div class="sec">
        <div class="shd">Módulos — <span id="colSelHint" style="color:var(--acc)">Col A</span></div>
        <div id="modulesList"></div>
        <select id="addModuleSelect" style="width:100%;padding:6px;margin:6px 0;background:#242018;border:1px solid var(--border);color:var(--cream)">
          <option value="barra">🎽 Barra colgador</option>
          <option value="barra_larga">👗 Barra vestidos largos</option>
          <option value="estantes">📦 Estantes</option>
          <option value="cajones">🗂 Cajones x3</option>
          <option value="zapatero">👟 Zapatero</option>
          <option value="pantalonero">👖 Pantalonero</option>
          <option value="luz">💡 Luz LED</option>
        </select>
        <button class="add-btn" onclick="addModule()">+ Añadir módulo</button>
      </div>
    </div>

    <div class="pane" id="pane-mats">
      <div class="sec">
        <div class="shd">Color</div>
        <div class="cgrid" id="cpicker">
          <div class="sw active" data-c="#F5F0E8" data-n="Blanco" style="background:#F5F0E8"></div>
          <div class="sw" data-c="#E8D8C4" data-n="Roble" style="background:#E8D8C4"></div>
          <div class="sw" data-c="#C4A882" data-n="Nogal" style="background:#C4A882"></div>
          <div class="sw" data-c="#8B7355" data-n="Wengué" style="background:#8B7355"></div>
          <div class="sw" data-c="#4A4A4A" data-n="Grafito" style="background:#4A4A4A"></div>
          <div class="sw" data-c="#1E1C18" data-n="Negro" style="background:#1E1C18"></div>
        </div>
      </div>
      <div class="sec">
        <div class="shd">Tiradores</div>
        <div class="fgrid" id="handles">
          <button class="fb active" data-v="dorado">Dorado</button>
          <button class="fb" data-v="plateado">Plateado</button>
          <button class="fb" data-v="negro">Negro</button>
          <button class="fb" data-v="sin">Sin</button>
        </div>
      </div>
    </div>
  </div>

  <div class="viewport">
    <canvas id="c3"></canvas>
    <div class="vctrl">
      <button class="vc" onclick="setView('front',this)">Frontal</button>
      <button class="vc active" onclick="setView('corner',this)">Esquina</button>
      <button class="vc" onclick="setView('top',this)">Planta</button>
    </div>
    <div class="hint">🖱️ Arrastra para rotar | Rueda zoom</div>
  </div>

  <div class="rpanel">
    <div class="sblock">
      <div class="stitle">Resumen</div>
      <div class="sr"><span class="sk">Ancho</span><span class="sv" id="rW">0 cm</span></div>
      <div class="sr"><span class="sk">Alto</span><span class="sv" id="rH">220 cm</span></div>
      <div class="sr"><span class="sk">Fondo</span><span class="sv" id="rD">60 cm</span></div>
      <div class="sr"><span class="sk">Puertas</span><span class="sv" id="rDoor">Correderas</span></div>
      <div class="sr"><span class="sk">Columnas</span><span class="sv" id="rCols">3</span></div>
    </div>
    <div class="ctas">
      <button class="bwa" onclick="openWA()">📱 WhatsApp</button>
      <button class="bem" onclick="openModal()">✉ Email</button>
      <button class="bpdf" onclick="downloadPDF()">📄 PDF</button>
    </div>
  </div>
</div>

<div class="mob-bar">
  <button class="mb-wa" onclick="openWA()">WhatsApp</button>
  <button class="mb-em" onclick="openModal()">Email</button>
  <button class="mb-pdf" onclick="downloadPDF()">PDF</button>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="mhd"><h2>Enviar diseño</h2><button onclick="closeModal()" style="background:none;border:none;color:#fff;font-size:20px">×</button></div>
    <div class="mbdy">
      <div class="mcfg" id="mconf"></div>
      <div class="fld"><label>Nombre</label><input type="text" id="cName" placeholder="Tu nombre"></div>
      <div class="fld"><label>Email</label><input type="email" id="cEmail" placeholder="correo@ejemplo.com"></div>
      <div class="fld"><label>Teléfono</label><input type="tel" id="cPhone"></div>
      <div class="mact"><button class="mbc" onclick="closeModal()">Cancelar</button><button class="mbs" onclick="sendEmail()">Enviar</button></div>
    </div>
  </div>
</div>
<div class="toast" id="toast">✓ Enviado</div>

<script>
// ESTADO
let S = {
  H: 2.2, D: 0.6, door: 'correderas',
  color: '#F5F0E8', handle: 'dorado', sel: 0,
  cols: [
    { id: 1, w: 0.65, lbl: 'Col A', mods: [{type:'barra'},{type:'estantes'}] },
    { id: 2, w: 0.70, lbl: 'Col B', mods: [{type:'estantes'},{type:'estantes'}] },
    { id: 3, w: 0.65, lbl: 'Col C', mods: [{type:'cajones'},{type:'zapatero'}] }
  ]
};
let nextId = 4;

const modTypes = {
  barra: '🎽 Barra', barra_larga: '👗 Barra larga', estantes: '📦 Estantes',
  cajones: '🗂 Cajones', zapatero: '👟 Zapatero', pantalonero: '👖 Pantalonero', luz: '💡 LED'
};

function anchoTotal() { return S.cols.reduce((s,c)=>s+c.w,0); }

// THREE.JS
const cv = document.getElementById('c3');
const ren = new THREE.WebGLRenderer({ canvas: cv, antialias: true });
ren.setSize(cv.clientWidth, cv.clientHeight);
ren.shadowMap.enabled = true;
const sc = new THREE.Scene();
sc.background = new THREE.Color(0x16140F);
const cam = new THREE.PerspectiveCamera(42, 1, 0.1, 50);
sc.add(new THREE.AmbientLight(0xFFFFFF, 0.5));
const luz = new THREE.DirectionalLight(0xFFF5E0, 1);
luz.position.set(3, 5, 2);
luz.castShadow = true;
sc.add(luz);
const wg = new THREE.Group();
sc.add(wg);
let hits = [];

function colorNum(hex) { return new THREE.Color(parseInt(hex.replace('#',''),16)); }

function build() {
  while(wg.children.length) wg.remove(wg.children[0]);
  hits = [];
  const H = S.H, D = S.D, T = 0.018, TW = anchoTotal();
  const mat = new THREE.MeshStandardMaterial({ color: colorNum(S.color), roughness: 0.6 });
  
  // Caja exterior
  const addBox = (w,h,d,x,y,z) => { const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat); m.position.set(x,y,z); m.castShadow=true; wg.add(m); };
  addBox(TW, T, D, 0, H-T/2, 0);
  addBox(TW, T, D, 0, T/2, 0);
  addBox(T, H, D, -TW/2+T/2, H/2, 0);
  addBox(T, H, D, TW/2-T/2, H/2, 0);
  
  let x = -TW/2 + T;
  S.cols.forEach((col, idx) => {
    const cw = col.w, cx = x + cw/2;
    if(idx < S.cols.length-1) addBox(T, H-2*T, D-2*T, x+cw, H/2, 0);
    
    // Hitbox
    const hb = new THREE.Mesh(new THREE.BoxGeometry(cw-T, H-T, D-T), new THREE.MeshBasicMaterial({visible:false}));
    hb.position.set(cx, H/2, 0);
    hb.userData = { idx };
    wg.add(hb);
    hits.push(hb);
    
    // Highlight
    if(idx === S.sel){
      const hl = new THREE.Mesh(new THREE.BoxGeometry(cw-T, H-2*T, D-2*T), new THREE.MeshBasicMaterial({color:0xC4A46B, wireframe:true, transparent:true, opacity:0.3}));
      hl.position.set(cx, H/2, 0);
      wg.add(hl);
    }
    
    // Módulos
    let yOff = T;
    col.mods.forEach(mod => {
      const alt = mod.type==='barra'?0.12 : mod.type==='barra_larga'?0.25 : mod.type==='estantes'?0.02 : mod.type==='cajones'?0.25 : mod.type==='zapatero'?0.15 : mod.type==='pantalonero'?0.12 : 0.05;
      const cy = yOff + alt/2;
      
      if(mod.type==='barra' || mod.type==='barra_larga'){
        const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.008,0.008,cw-0.08,8), new THREE.MeshStandardMaterial({color:0xC4A46B, metalness:0.85}));
        bar.rotation.z = Math.PI/2;
        bar.position.set(cx, cy+alt*0.4, D*0.15);
        wg.add(bar);
      }
      else if(mod.type==='estantes'){
        const est = new THREE.Mesh(new THREE.BoxGeometry(cw-T*2, 0.015, D-T*2), new THREE.MeshStandardMaterial({color:colorNum(S.color)}));
        est.position.set(cx, cy, 0);
        wg.add(est);
      }
      else if(mod.type==='cajones'){
        for(let i=0;i<3;i++){
          const caj = new THREE.Mesh(new THREE.BoxGeometry(cw-T*3, alt*0.25, D*0.85), mat);
          caj.position.set(cx, cy-alt*0.3 + i*alt*0.33, T*0.5);
          wg.add(caj);
        }
      }
      else if(mod.type==='zapatero'){
        for(let i=0;i<2;i++){
          const zap = new THREE.Mesh(new THREE.BoxGeometry(cw-T*2, 0.02, D*0.45), mat);
          zap.rotation.x = 0.15;
          zap.position.set(cx, cy-alt*0.2 + i*alt*0.4, -D*0.1);
          wg.add(zap);
        }
      }
      else if(mod.type==='pantalonero'){
        for(let i=0;i<3;i++){
          const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.005,0.005,cw-0.1,8), new THREE.MeshStandardMaterial({color:0xC4A46B, metalness:0.7}));
          bar.rotation.z = Math.PI/2;
          bar.position.set(cx, cy-alt*0.3 + i*alt*0.35, D*0.08);
          wg.add(bar);
        }
      }
      else if(mod.type==='luz'){
        const led = new THREE.Mesh(new THREE.BoxGeometry(cw*0.7, 0.005, 0.01), new THREE.MeshStandardMaterial({color:0xFFEEAA, emissive:0xFFAA66, emissiveIntensity:1}));
        led.position.set(cx, cy+alt/2, -D*0.22);
        wg.add(led);
      }
      yOff += alt;
    });
    
    // Puerta
    if(S.door !== 'sin'){
      let dColor = S.color, mtal=0, rough=0.6;
      if(S.door==='espejo'){ dColor='#C8D8E8'; mtal=0.95; rough=0.05; }
      if(S.door==='cristal'){ dColor='#A8D8F0'; mtal=0.1; rough=0.05; }
      const door = new THREE.Mesh(new THREE.BoxGeometry(cw-0.005, H-0.005, T*1.2), new THREE.MeshStandardMaterial({color:colorNum(dColor), metalness:mtal, roughness:rough}));
      door.position.set(cx, H/2, D/2+T*0.6);
      wg.add(door);
      
      if(S.handle !== 'sin'){
        const hCol = S.handle==='dorado'?0xC4A46B : S.handle==='plateado'?0xC0C8D0 : 0x1A1814;
        const man = new THREE.Mesh(new THREE.CylinderGeometry(0.006,0.006,0.08,8), new THREE.MeshStandardMaterial({color:hCol, metalness:0.85}));
        man.position.set(cx + (idx%2===0?cw*0.3:-cw*0.3), H/2, D/2+T*1.2);
        wg.add(man);
      }
    }
    x += cw;
  });
  syncUI();
  renderCols();
  renderMods();
}

function renderCols(){
  const el = document.getElementById('colList');
  if(!el) return;
  el.innerHTML = '';
  S.cols.forEach((c,i)=>{
    const d = document.createElement('div');
    d.className = 'ci'+(i===S.sel?' sel':'');
    d.innerHTML = `<span class="clbl">${c.lbl}</span><input class="cwi" value="${(c.w*100).toFixed(0)}"><button class="cdel" onclick="delCol(${i})">×</button>`;
    d.querySelector('.cwi').onchange = (e) => { let v=parseFloat(e.target.value); if(v<30)v=30; if(v>200)v=200; S.cols[i].w=v/100; build(); };
    d.onclick = () => { S.sel=i; build(); };
    el.appendChild(d);
  });
  document.getElementById('colSelHint').innerHTML = S.cols[S.sel]?.lbl || '—';
}

function renderMods(){
  const el = document.getElementById('modulesList');
  if(!el) return;
  const col = S.cols[S.sel];
  if(!col){ el.innerHTML='<div style="color:#666">Selecciona una columna</div>'; return; }
  el.innerHTML = '';
  col.mods.forEach((mod, idx) => {
    const d = document.createElement('div');
    d.className = 'mod-item';
    d.draggable = true;
    d.ondragstart = (e) => { e.dataTransfer.setData('idx', idx); };
    d.ondragover = (e) => e.preventDefault();
    d.ondrop = (e) => {
      e.preventDefault();
      const from = parseInt(e.dataTransfer.getData('idx'));
      if(from===idx) return;
      const mov = col.mods.splice(from,1)[0];
      col.mods.splice(idx,0,mov);
      build();
    };
    d.innerHTML = `
      <div class="mod-header"><span class="mod-name">${modTypes[mod.type]||mod.type}</span><button class="mod-del" onclick="delModule(${idx})">×</button></div>
      <div class="mod-controls"><select onchange="changeModType(${idx},this.value)"><option value="barra" ${mod.type==='barra'?'selected':''}>🎽 Barra</option><option value="barra_larga" ${mod.type==='barra_larga'?'selected':''}>👗 Barra larga</option><option value="estantes" ${mod.type==='estantes'?'selected':''}>📦 Estantes</option><option value="cajones" ${mod.type==='cajones'?'selected':''}>🗂 Cajones</option><option value="zapatero" ${mod.type==='zapatero'?'selected':''}>👟 Zapatero</option><option value="pantalonero" ${mod.type==='pantalonero'?'selected':''}>👖 Pantalonero</option><option value="luz" ${mod.type==='luz'?'selected':''}>💡 LED</option></select><button onclick="moveMod(${idx},-1)">↑</button><button onclick="moveMod(${idx},1)">↓</button></div>
    `;
    el.appendChild(d);
  });
}

function addModule(){ S.cols[S.sel]?.mods.push({type:document.getElementById('addModuleSelect').value}); build(); }
function delModule(i){ S.cols[S.sel]?.mods.splice(i,1); build(); }
function changeModType(i, t){ if(S.cols[S.sel]) S.cols[S.sel].mods[i].type = t; build(); }
function moveMod(i, dir){ let m = S.cols[S.sel]?.mods; if(m && i+dir>=0 && i+dir<m.length){ [m[i], m[i+dir]] = [m[i+dir], m[i]]; build(); } }
function addCol(){ S.cols.push({id:nextId++, w:0.6, lbl:'Col '+String.fromCharCode(65+S.cols.length), mods:[]}); S.sel=S.cols.length-1; build(); }
function delCol(i){ if(S.cols.length>1){ S.cols.splice(i,1); if(S.sel>=S.cols.length) S.sel=S.cols.length-1; build(); } }
function syncUI(){ let tw=(anchoTotal()*100).toFixed(0); document.getElementById('inW').value=tw; document.getElementById('rW').innerHTML=tw+' cm'; document.getElementById('rH').innerHTML=(S.H*100).toFixed(0)+' cm'; document.getElementById('rD').innerHTML=(S.D*100).toFixed(0)+' cm'; document.getElementById('rCols').innerHTML=S.cols.length; }
function getConfig(){ let txt=`📏 MEDIDAS:\n• Ancho: ${(anchoTotal()*100).toFixed(0)} cm\n• Alto: ${(S.H*100).toFixed(0)} cm\n• Fondo: ${(S.D*100).toFixed(0)} cm\n• Puertas: ${S.door}\n• Color: ${S.color}\n\n📦 COLUMNAS:\n`; S.cols.forEach(c=>{ txt+=`\n${c.lbl} (${(c.w*100).toFixed(0)} cm):\n`; c.mods.forEach(m=>txt+=`  • ${modTypes[m.type]||m.type}\n`); }); return txt; }

// Cámara
let ry=0.65, rx=0.25, dist=3, dragging=false, lx=0, ly=0;
function posCam(){ let H=S.H; cam.position.x=Math.sin(ry)*dist*Math.cos(rx); cam.position.z=Math.cos(ry)*dist*Math.cos(rx); cam.position.y=H*0.5+dist*Math.sin(rx); cam.lookAt(0,H*0.5,0); }
function setView(v,btn){ document.querySelectorAll('.vc').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); if(v==='front'){ry=0;rx=0.1;} if(v==='corner'){ry=0.65;rx=0.25;} if(v==='top'){ry=0.1;rx=1.2;} posCam(); }
cv.onmousedown = e => { dragging=true; lx=e.clientX; ly=e.clientY; };
window.onmouseup = () => dragging=false;
window.onmousemove = e => { if(!dragging) return; ry+=(e.clientX-lx)*0.007; rx+=(e.clientY-ly)*0.005; rx=Math.max(-0.3,Math.min(1.3,rx)); lx=e.clientX; ly=e.clientY; posCam(); };
cv.onwheel = e => { dist=Math.max(1.2,Math.min(6,dist*(1+e.deltaY*0.002))); posCam(); };
cv.onclick = e => { const r=cv.getBoundingClientRect(); const m2=new THREE.Vector2(((e.clientX-r.left)/r.width)*2-1, -((e.clientY-r.top)/r.height)*2+1); const ray=new THREE.Raycaster(); ray.setFromCamera(m2,cam); const ints=ray.intersectObjects(hits); if(ints.length){ S.sel=ints[0].object.userData.idx; build(); } };
function resize(){ const w=cv.parentElement.clientWidth, h=cv.parentElement.clientHeight; ren.setSize(w,h); cam.aspect=w/h; cam.updateProjectionMatrix(); }
window.onresize = resize;
resize();
function animate(){ requestAnimationFrame(animate); ren.render(sc,cam); }
animate();

// Eventos
document.getElementById('inH').onchange = e => { S.H = parseInt(e.target.value)/100; build(); posCam(); };
document.getElementById('inD').onchange = e => { S.D = parseInt(e.target.value)/100; build(); };
document.getElementById('dtypes').onclick = e => { let b=e.target.closest('.fb'); if(b){ document.querySelectorAll('#dtypes .fb').forEach(x=>x.classList.remove('active')); b.classList.add('active'); S.door=b.dataset.v; build(); } };
document.getElementById('handles').onclick = e => { let b=e.target.closest('.fb'); if(b){ document.querySelectorAll('#handles .fb').forEach(x=>x.classList.remove('active')); b.classList.add('active'); S.handle=b.dataset.v; build(); } };
document.getElementById('cpicker').onclick = e => { let d=e.target.closest('.sw'); if(d){ document.querySelectorAll('#cpicker .sw').forEach(x=>x.classList.remove('active')); d.classList.add('active'); S.color=d.dataset.c; build(); } };
function switchTab(id,el){ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active')); if(el)el.classList.add('active'); document.getElementById('pane-'+id).classList.add('active'); }

function downloadPDF(){ html2pdf().set({margin:1, filename:`armario_${Date.now()}.pdf`}).from(`<html><head><meta charset="UTF-8"></head><body><pre>${getConfig()}</pre></body></html>`).save(); showToast('📄 PDF listo'); }
function openWA(){ window.open(`https://wa.me/573146309609?text=${encodeURIComponent('Hola! Me interesa este diseño:\n\n'+getConfig())}`,'_blank'); }
function openModal(){ document.getElementById('mconf').innerText = getConfig(); document.getElementById('overlay').classList.add('open'); }
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
function sendEmail(){ let n=document.getElementById('cName').value, e=document.getElementById('cEmail').value; if(!n||!e){ alert('Completa nombre y email'); return; } window.location.href=`mailto:miguel_716@hotmail.com?subject=Diseño armario&body=${encodeURIComponent(getConfig()+'\n\nNombre: '+n+'\nEmail: '+e)}`; closeModal(); showToast('✓ Enviado'); }
function showToast(m){ let t=document.getElementById('toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

build();
posCam();
</script>
</body>
