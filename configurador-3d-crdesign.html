<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Configurador 3D — CR Design Muebles</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #13110E;
    color: #E8E0D0;
    overflow: hidden;
    height: 100vh;
  }

  header {
    height: 50px;
    background: #0D0B08;
    border-bottom: 1px solid #252018;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    color: #E8E0D0;
    text-decoration: none;
  }

  .logo em {
    color: #C4A46B;
    font-style: normal;
  }

  .hbtns {
    display: flex;
    gap: 6px;
  }

  .hb {
    padding: 5px 12px;
    font-size: 10px;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    border-radius: 2px;
    cursor: pointer;
    transition: all .15s;
    border: none;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    text-decoration: none;
  }

  .hbg {
    background: transparent;
    color: #5A5650;
    border: 1px solid #252018;
  }

  .hbg:hover {
    border-color: #C4A46B;
    color: #C4A46B;
  }

  .hbw {
    background: #25D366;
    color: #fff;
  }

  .hbw:hover {
    background: #1ebe5d;
  }

  .hba {
    background: #C4A46B;
    color: #1A1510;
    font-weight: 500;
  }

  .layout {
    display: flex;
    height: calc(100vh - 50px);
  }

  .lp {
    width: 260px;
    background: #181510;
    border-right: 1px solid #252018;
    overflow-y: auto;
    flex-shrink: 0;
    padding: 12px;
  }

  .rp {
    width: 200px;
    background: #181510;
    border-left: 1px solid #252018;
    overflow-y: auto;
    flex-shrink: 0;
    padding: 12px;
  }

  .vp {
    flex: 1;
    position: relative;
    background: #13110E;
    overflow: hidden;
  }

  #canvas3d {
    display: block;
    width: 100%;
    height: 100%;
  }

  .sh {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: #302820;
    margin-bottom: 9px;
    padding-bottom: 5px;
    border-bottom: 1px solid #252018;
  }

  .sec {
    margin-bottom: 16px;
  }

  .dr {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 7px;
  }

  .dr label {
    font-size: 11px;
    color: #6B6050;
    min-width: 50px;
  }

  .diw {
    flex: 1;
    position: relative;
  }

  .di {
    width: 100%;
    padding: 5px 26px 5px 8px;
    font-size: 12px;
    background: #201C14;
    border: 1px solid #302820;
    border-radius: 2px;
    color: #E8E0D0;
    outline: none;
  }

  .di:focus {
    border-color: #C4A46B;
  }

  .du {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 9px;
    color: #3A3628;
  }

  .clist {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 7px;
  }

  .ci {
    background: #201C14;
    border: 1px solid #252018;
    border-radius: 2px;
    padding: 6px 8px;
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
  }

  .ci.sel {
    border-color: #C4A46B;
    background: rgba(196, 164, 107, 0.07);
  }

  .clb {
    font-size: 11px;
    color: #E8E0D0;
    flex: 1;
  }

  .cwi {
    width: 46px;
    padding: 2px 4px;
    font-size: 11px;
    background: #181510;
    border: 1px solid #302820;
    border-radius: 2px;
    color: #C4A46B;
    text-align: center;
  }

  .cdel {
    width: 17px;
    height: 17px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    color: #3A2828;
    font-size: 13px;
    cursor: pointer;
    border: none;
  }

  .cdel:hover {
    color: #E74C3C;
  }

  .addbtn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 6px;
    border: 1px dashed #302820;
    border-radius: 2px;
    font-size: 10px;
    color: #3A3628;
    cursor: pointer;
    background: transparent;
    width: 100%;
  }

  .addbtn:hover {
    border-color: #C4A46B;
    color: #C4A46B;
  }

  .mel-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
    margin-bottom: 6px;
  }

  .mel {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 3px;
    cursor: pointer;
    border: 2px solid transparent;
    outline: 2px solid transparent;
  }

  .mel.on {
    outline-color: #C4A46B;
  }

  .vctrl {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
    background: rgba(13, 11, 8, 0.9);
    border: 1px solid #252018;
    border-radius: 3px;
    padding: 5px;
    z-index: 10;
  }

  .vc {
    padding: 5px 12px;
    font-size: 9px;
    background: transparent;
    color: #5A5650;
    border: none;
    border-radius: 2px;
    cursor: pointer;
  }

  .vc:hover {
    color: #E8E0D0;
  }

  .vc.on {
    background: rgba(196, 164, 107, 0.18);
    color: #C4A46B;
  }

  .hint {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    color: rgba(255, 255, 255, 0.15);
    pointer-events: none;
    white-space: nowrap;
    z-index: 10;
  }

  .sblk {
    background: #0D0B08;
    border: 1px solid #252018;
    border-radius: 2px;
    padding: 10px;
    margin-bottom: 11px;
  }

  .stit {
    font-size: 8px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #C4A46B;
    margin-bottom: 8px;
  }

  .sr2 {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    font-size: 10px;
  }

  .sk {
    color: #6B6050;
  }

  .sv {
    font-weight: 500;
    color: #E8E0D0;
  }

  .ctas {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .bwa2 {
    padding: 10px;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    background: #25D366;
    color: #fff;
    border: none;
    border-radius: 2px;
    cursor: pointer;
  }

  .bem2 {
    padding: 9px;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    background: #C4A46B;
    color: #1A1510;
    border: none;
    border-radius: 2px;
    cursor: pointer;
  }

  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: #0D0B08;
    border: 1px solid #C4A46B;
    color: #E8E0D0;
    padding: 9px 17px;
    border-radius: 2px;
    font-size: 11px;
    opacity: 0;
    transition: all .3s;
    pointer-events: none;
    z-index: 999;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">CR <em>Design</em> Muebles</a>
  <div class="hbtns">
    <a class="hb hbg" href="index.html">← Volver</a>
    <button class="hb hbw" id="whatsappBtn">WhatsApp</button>
    <button class="hb hba" id="citaBtn">✉ Cita</button>
  </div>
</header>

<div class="layout">

  <div class="lp">
    <div class="sec">
      <div class="sh">Dimensiones</div>
      <div class="dr"><label>Alto</label><div class="diw"><input class="di" type="number" id="altoInput" value="220" min="150" max="300"><span class="du">cm</span></div></div>
      <div class="dr"><label>Fondo</label><div class="diw"><input class="di" type="number" id="fondoInput" value="60" min="30" max="80"><span class="du">cm</span></div></div>
      <div class="dr"><label>Ancho</label><div class="diw"><input class="di" type="text" id="anchoDisplay" readonly><span class="du">cm</span></div></div>
    </div>

    <div class="sec">
      <div class="sh">Columnas</div>
      <div class="clist" id="colList"></div>
      <button class="addbtn" id="addColBtn">+ Añadir columna</button>
    </div>

    <div class="sec">
      <div class="sh">Color</div>
      <div class="mel-grid" id="colorGrid"></div>
    </div>
  </div>

  <div class="vp">
    <canvas id="canvas3d"></canvas>
    <div class="vctrl">
      <button class="vc" data-view="front">Frontal</button>
      <button class="vc on" data-view="corner">Esquina</button>
      <button class="vc" data-view="top">Planta</button>
    </div>
    <div class="hint">🖱️ Arrastra para rotar | Rueda para zoom</div>
  </div>

  <div class="rp">
    <div class="sblk">
      <div class="stit">Resumen</div>
      <div class="sr2"><span class="sk">Ancho</span><span class="sv" id="resAncho">200 cm</span></div>
      <div class="sr2"><span class="sk">Alto</span><span class="sv" id="resAlto">220 cm</span></div>
      <div class="sr2"><span class="sk">Fondo</span><span class="sv" id="resFondo">60 cm</span></div>
      <div class="sr2"><span class="sk">Columnas</span><span class="sv" id="resCols">3</span></div>
    </div>
    <div class="ctas">
      <button class="bwa2" id="whatsappBtn2">📱 WhatsApp</button>
      <button class="bem2" id="citaBtn2">✉ Solicitar cita</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">✓ Abriendo WhatsApp...</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  // ============================================
  // CONFIGURADOR 3D - COMPLETO Y FUNCIONAL
  // ============================================

  // Estado
  let estado = {
    alto: 2.2,
    fondo: 0.6,
    color: 0xF4F1EB,
    columnas: [
      { id: 1, ancho: 0.65, nombre: 'Col A' },
      { id: 2, ancho: 0.70, nombre: 'Col B' },
      { id: 3, ancho: 0.65, nombre: 'Col C' }
    ],
    seleccion: 0
  };

  let nextId = 4;
  let scene, camera, renderer, muebleGroup;
  let rotating = false;
  let lastX = 0, lastY = 0;
  let rotX = 0.3, rotY = 0.5;
  let distance = 3.5;
  let hitboxes = [];

  // Colores disponibles
  const colores = [
    { nombre: 'Blanco Ártico', hex: 0xF4F1EB },
    { nombre: 'Roble Nórdico', hex: 0xD4BC98 },
    { nombre: 'Roble Natural', hex: 0xC8A87A },
    { nombre: 'Nogal', hex: 0xA8845C },
    { nombre: 'Wengué', hex: 0x3C2A1A },
    { nombre: 'Ébano', hex: 0x1C1410 },
    { nombre: 'Gris', hex: 0x9A9890 },
    { nombre: 'Verde', hex: 0x7A9878 }
  ];

  function anchoTotal() {
    return estado.columnas.reduce((s, c) => s + c.ancho, 0);
  }

  function init3D() {
    const canvas = document.getElementById('canvas3d');
    const container = canvas.parentElement;
    const w = container.clientWidth;
    const h = container.clientHeight;

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x13110E);
    scene.fog = new THREE.Fog(0x13110E, 8, 20);

    camera = new THREE.PerspectiveCamera(40, w / h, 0.1, 50);
    camera.position.set(2.5, 1.5, 3.5);

    renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(w, h);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;

    // Luces
    const ambient = new THREE.AmbientLight(0x404040, 0.6);
    scene.add(ambient);
    
    const mainLight = new THREE.DirectionalLight(0xFFF5E0, 1);
    mainLight.position.set(3, 5, 2);
    mainLight.castShadow = true;
    scene.add(mainLight);
    
    const fillLight = new THREE.DirectionalLight(0x88AACC, 0.4);
    fillLight.position.set(-2, 2, 3);
    scene.add(fillLight);
    
    const backLight = new THREE.PointLight(0xFFAA66, 0.3);
    backLight.position.set(0, 1.5, -1.5);
    scene.add(backLight);

    // Suelo
    const grid = new THREE.GridHelper(8, 20, 0x3A3628, 0x252018);
    grid.position.y = -0.01;
    scene.add(grid);

    muebleGroup = new THREE.Group();
    scene.add(muebleGroup);

    // Controles
    canvas.addEventListener('mousedown', (e) => {
      rotating = true;
      lastX = e.clientX;
      lastY = e.clientY;
    });

    window.addEventListener('mouseup', () => {
      rotating = false;
    });

    window.addEventListener('mousemove', (e) => {
      if (!rotating) return;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      rotY += dx * 0.008;
      rotX += dy * 0.008;
      rotX = Math.max(0.1, Math.min(1.2, rotX));
      lastX = e.clientX;
      lastY = e.clientY;
      updateCamera();
    });

    canvas.addEventListener('wheel', (e) => {
      distance += e.deltaY * 0.005;
      distance = Math.max(1.2, Math.min(6, distance));
      updateCamera();
    });

    // Click para seleccionar
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const mouse = new THREE.Vector2();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

      const raycaster = new THREE.Raycaster();
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(hitboxes);

      if (intersects.length > 0) {
        const idx = intersects[0].object.userData.idx;
        if (idx !== undefined) {
          estado.seleccion = idx;
          buildFurniture();
          updateUI();
        }
      }
    });

    window.addEventListener('resize', onResize);
    
    buildFurniture();
    updateCamera();
    animate();
  }

  function updateCamera() {
    const x = Math.sin(rotY) * distance * Math.cos(rotX);
    const z = Math.cos(rotY) * distance * Math.cos(rotX);
    const y = Math.sin(rotX) * distance + estado.alto / 2;
    camera.position.set(x, y, z);
    camera.lookAt(0, estado.alto / 2, 0);
  }

  function onResize() {
    const container = document.getElementById('canvas3d').parentElement;
    const w = container.clientWidth;
    const h = container.clientHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }

  function buildFurniture() {
    while (muebleGroup.children.length > 0) {
      muebleGroup.remove(muebleGroup.children[0]);
    }
    hitboxes = [];

    const totalW = anchoTotal();
    const alto = estado.alto;
    const fondo = estado.fondo;
    const thick = 0.018;
    const material = new THREE.MeshStandardMaterial({ color: estado.color, roughness: 0.6 });

    // Panel trasero
    const back = new THREE.Mesh(new THREE.BoxGeometry(totalW, alto, thick), material);
    back.position.set(0, alto / 2, -fondo / 2 + thick / 2);
    back.castShadow = true;
    muebleGroup.add(back);

    // Techo y piso
    const top = new THREE.Mesh(new THREE.BoxGeometry(totalW, thick, fondo), material);
    top.position.set(0, alto - thick / 2, 0);
    top.castShadow = true;
    muebleGroup.add(top);

    const bottom = new THREE.Mesh(new THREE.BoxGeometry(totalW, thick, fondo), material);
    bottom.position.set(0, thick / 2, 0);
    bottom.castShadow = true;
    muebleGroup.add(bottom);

    // Laterales
    const left = new THREE.Mesh(new THREE.BoxGeometry(thick, alto, fondo), material);
    left.position.set(-totalW / 2 + thick / 2, alto / 2, 0);
    left.castShadow = true;
    muebleGroup.add(left);

    const right = new THREE.Mesh(new THREE.BoxGeometry(thick, alto, fondo), material);
    right.position.set(totalW / 2 - thick / 2, alto / 2, 0);
    right.castShadow = true;
    muebleGroup.add(right);

    // Columnas
    let xPos = -totalW / 2 + thick;
    estado.columnas.forEach((col, idx) => {
      const colW = col.ancho;
      const centerX = xPos + colW / 2;

      // Divider
      if (idx < estado.columnas.length - 1) {
        const divider = new THREE.Mesh(new THREE.BoxGeometry(thick, alto - thick * 2, fondo - thick * 2), material);
        divider.position.set(xPos + colW, alto / 2, 0);
        divider.castShadow = true;
        muebleGroup.add(divider);
      }

      // Hitbox
      const hitbox = new THREE.Mesh(
        new THREE.BoxGeometry(colW - thick, alto - thick * 2, fondo - thick * 2),
        new THREE.MeshBasicMaterial({ visible: false })
      );
      hitbox.position.set(centerX, alto / 2, 0);
      hitbox.userData = { idx: idx };
      muebleGroup.add(hitbox);
      hitboxes.push(hitbox);

      // Selección highlight
      if (idx === estado.seleccion) {
        const highlight = new THREE.Mesh(
          new THREE.BoxGeometry(colW - thick, alto - thick * 2, fondo - thick * 2),
          new THREE.MeshBasicMaterial({ color: 0xC4A46B, wireframe: true, transparent: true, opacity: 0.3 })
        );
        highlight.position.set(centerX, alto / 2, 0);
        muebleGroup.add(highlight);
      }

      // Estantes
      const shelfMat = new THREE.MeshStandardMaterial({ color: estado.color, roughness: 0.7 });
      for (let i = 1; i <= 2; i++) {
        const shelf = new THREE.Mesh(new THREE.BoxGeometry(colW - thick * 2, 0.015, fondo - thick * 2), shelfMat);
        shelf.position.set(centerX, i * (alto / 3), 0);
        shelf.castShadow = true;
        muebleGroup.add(shelf);
      }

      xPos += colW;
    });
  }

  function updateUI() {
    const totalCm = (anchoTotal() * 100).toFixed(0);
    document.getElementById('anchoDisplay').value = totalCm;
    document.getElementById('resAncho').textContent = totalCm + ' cm';
    document.getElementById('resAlto').textContent = estado.alto * 100 + ' cm';
    document.getElementById('resFondo').textContent = estado.fondo * 100 + ' cm';
    document.getElementById('resCols').textContent = estado.columnas.length;

    // Lista de columnas
    const container = document.getElementById('colList');
    container.innerHTML = '';
    estado.columnas.forEach((col, i) => {
      const div = document.createElement('div');
      div.className = 'ci' + (i === estado.seleccion ? ' sel' : '');
      div.innerHTML = `
        <span class="clb">${col.nombre}</span>
        <input class="cwi" type="number" value="${(col.ancho * 100).toFixed(0)}" min="30" max="250" step="5">
        ${estado.columnas.length > 1 ? '<button class="cdel">×</button>' : ''}
      `;
      
      const input = div.querySelector('.cwi');
      input.addEventListener('change', (e) => {
        let val = parseFloat(e.target.value);
        if (val < 30) val = 30;
        if (val > 250) val = 250;
        estado.columnas[i].ancho = val / 100;
        e.target.value = val;
        buildFurniture();
        updateUI();
      });

      const delBtn = div.querySelector('.cdel');
      if (delBtn) {
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (estado.columnas.length > 1) {
            estado.columnas.splice(i, 1);
            if (estado.seleccion >= estado.columnas.length) {
              estado.seleccion = estado.columnas.length - 1;
            }
            buildFurniture();
            updateUI();
          }
        });
      }

      div.addEventListener('click', () => {
        estado.seleccion = i;
        buildFurniture();
        updateUI();
      });

      container.appendChild(div);
    });

    // Colores
    const colorContainer = document.getElementById('colorGrid');
    if (colorContainer.children.length === 0) {
      colores.forEach((c) => {
        const div = document.createElement('div');
        div.className = 'mel' + (c.hex === estado.color ? ' on' : '');
        div.style.backgroundColor = '#' + c.hex.toString(16).padStart(6, '0');
        div.style.border = '1px solid rgba(255,255,255,0.1)';
        div.onclick = () => {
          document.querySelectorAll('#colorGrid .mel').forEach(el => el.classList.remove('on'));
          div.classList.add('on');
          estado.color = c.hex;
          buildFurniture();
        };
        colorContainer.appendChild(div);
      });
    }
  }

  function setView(view) {
    switch(view) {
      case 'front':
        rotY = 0;
        rotX = 0.1;
        distance = 3;
        break;
      case 'corner':
        rotY = 0.65;
        rotX = 0.25;
        distance = 3.5;
        break;
      case 'top':
        rotY = 0.1;
        rotX = 1.2;
        distance = 3;
        break;
    }
    updateCamera();
  }

  function animate() {
    requestAnimationFrame(animate);
    if (renderer && scene && camera) {
      renderer.render(scene, camera);
    }
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function cotizar() {
    const totalCm = (anchoTotal() * 100).toFixed(0);
    const msg = `Hola CR Design Muebles! Me interesa este armario:\n\n📐 Dimensiones:\n- Ancho: ${totalCm} cm\n- Alto: ${estado.alto * 100} cm\n- Fondo: ${estado.fondo * 100} cm\n\n📦 Columnas: ${estado.columnas.length}\n\n¿Podrían darme información y presupuesto?`;
    window.open(`https://wa.me/573146309609?text=${encodeURIComponent(msg)}`, '_blank');
    showToast('✓ Abriendo WhatsApp...');
  }

  // Eventos
  document.getElementById('altoInput').addEventListener('change', (e) => {
    estado.alto = parseInt(e.target.value) / 100;
    buildFurniture();
    updateUI();
    updateCamera();
  });

  document.getElementById('fondoInput').addEventListener('change', (e) => {
    estado.fondo = parseInt(e.target.value) / 100;
    buildFurniture();
    updateUI();
  });

  document.getElementById('addColBtn').addEventListener('click', () => {
    const letras = ['D', 'E', 'F', 'G', 'H'];
    estado.columnas.push({
      id: nextId++,
      ancho: 0.60,
      nombre: `Col ${letras[estado.columnas.length % letras.length]}`
    });
    buildFurniture();
    updateUI();
  });

  document.querySelectorAll('.vc').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.vc').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      setView(btn.dataset.view);
    });
  });

  document.getElementById('whatsappBtn').addEventListener('click', cotizar);
  document.getElementById('whatsappBtn2').addEventListener('click', cotizar);
  document.getElementById('citaBtn').addEventListener('click', cotizar);
  document.getElementById('citaBtn2').addEventListener('click', cotizar);

  // Iniciar
  init3D();
</script>
</body>
</html>
