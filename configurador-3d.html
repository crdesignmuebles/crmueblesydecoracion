<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Configurador 3D Pro - CR Design</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #1a1a1a; overflow: hidden; height: 100vh; }

  .toolbar {
    position: fixed; top: 0; left: 0; right: 0; height: auto;
    background: #2c2c2c; border-bottom: 1px solid #444;
    display: flex; flex-wrap: wrap; align-items: center;
    padding: 8px 15px; gap: 6px;
    z-index: 100;
  }
  .logo { font-size: 13px; font-weight: 700; background: linear-gradient(135deg, #C4A46B, #E8D8B0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .btn { padding: 5px 10px; background: #3a3a3a; border: none; border-radius: 5px; color: #e0e0e0; cursor: pointer; font-size: 11px; display: inline-flex; align-items: center; gap: 4px; transition: all 0.2s; }
  .btn:hover { background: #4a4a4a; transform: translateY(-1px); }
  .btn-primary { background: #C4A46B; color: #1a1a1a; }
  .btn-danger { background: #8B3A3A; color: #fff; }
  .btn-success { background: #2D6A4F; color: #fff; }
  .btn-warning { background: #D4A017; color: #1a1a1a; }
  .separator { width: 1px; height: 25px; background: #555; margin: 0 5px; }

  .sidebar-left { position: fixed; left: 0; top: 85px; bottom: 0; width: 320px; background: #252525; border-right: 1px solid #444; overflow-y: auto; padding: 15px; z-index: 90; }
  .sidebar-right { position: fixed; right: 0; top: 85px; bottom: 0; width: 280px; background: #252525; border-left: 1px solid #444; overflow-y: auto; padding: 15px; z-index: 90; }
  #canvas-container { position: fixed; top: 85px; left: 320px; right: 280px; bottom: 0; background: #1a1a1a; }
  canvas { width: 100%; height: 100%; display: block; }

  .section { margin-bottom: 20px; border-bottom: 1px solid #3a3a3a; padding-bottom: 15px; }
  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #C4A46B; margin-bottom: 12px; font-weight: 600; }

  .element-list { max-height: 250px; overflow-y: auto; }
  .element-item { background: #333; margin-bottom: 5px; padding: 7px 8px; border-radius: 5px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; font-size: 11px; }
  .element-item:hover { background: #3d3d3d; }
  .element-item.selected { border-color: #C4A46B; background: #3a3a3a; }
  .element-item.selected-multi { border-color: #2D6A4F; background: #2a4a3a; }

  .transform-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
  .transform-input { background: #333; border: 1px solid #444; border-radius: 4px; padding: 5px 6px; color: #e0e0e0; font-size: 11px; width: 100%; }

  .medidas-realtime { background: #333; border-radius: 6px; padding: 10px; margin-top: 10px; font-size: 11px; }
  .medidas-realtime span { color: #C4A46B; font-weight: bold; }

  .float-buttons { position: fixed; bottom: 20px; right: 300px; display: flex; gap: 8px; z-index: 95; }
  .float-btn { width: 38px; height: 38px; background: #2c2c2c; border: 1px solid #555; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .float-btn:hover { background: #C4A46B; }

  .grosor-info { background: #2a2a2a; border-radius: 5px; padding: 8px; margin-bottom: 10px; font-size: 10px; color: #C4A46B; text-align: center; }
  .status-info { background: #1e3a2a; border-radius: 5px; padding: 8px; margin-bottom: 10px; font-size: 10px; color: #8bc34a; text-align: center; }

  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85); z-index: 200; align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-content {
    background: #2c2c2c; border-radius: 10px; padding: 25px; width: 90%; max-width: 450px;
    border: 1px solid #C4A46B; max-height: 90vh; overflow-y: auto;
  }
  .modal-content input, .modal-content textarea {
    width: 100%; padding: 10px; margin: 5px 0; background: #3a3a3a;
    border: 1px solid #555; border-radius: 5px; color: white;
  }
  .modal-buttons { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
  .btn-enviar { background: #2D6A4F; color: white; border: none; border-radius: 5px; padding: 12px 25px; cursor: pointer; }
  .btn-cancelar { background: #555; color: white; border: none; border-radius: 5px; padding: 12px 25px; cursor: pointer; }
  .loading { display: none; text-align: center; margin-top: 15px; color: #C4A46B; }

  @media (max-width: 900px) { .sidebar-left, .sidebar-right { display: none; } #canvas-container { left: 0; right: 0; } .float-buttons { right: 20px; } }
</style>
</head>
<body>

<div class="toolbar">
  <div class="logo">🔧 CR DESIGN 3D PRO</div>
  <div class="separator"></div>
  <div class="toolbar-group">
    <button class="btn btn-warning" onclick="rotateSelected(90)">🔄 Girar 90°</button>
    <button class="btn btn-warning" onclick="rotateSelected(180)">🔄 Girar 180°</button>
  </div>
  <div class="separator"></div>
  <div class="toolbar-group">
    <button class="btn" onclick="clearSelection()">🔲 Limpiar selección</button>
    <button class="btn btn-primary" onclick="editMultipleDimensions()">📐 Editar múltiples</button>
  </div>
  <div class="separator"></div>
  <div class="toolbar-group">
    <button class="btn" onclick="addElement('lateral')">🧱 Lateral</button>
    <button class="btn" onclick="addElement('piso')">📌 Piso</button>
    <button class="btn" onclick="addElement('techo')">📌 Techo</button>
    <button class="btn" onclick="addElement('espaldar')">📌 Espaldar</button>
    <button class="btn" onclick="addElement('puerta')">🚪 Puerta</button>
    <button class="btn" onclick="addElement('tirador')">🔘 Tirador</button>
    <button class="btn" onclick="addElement('estante')">📦 Estante</button>
    <button class="btn btn-success" onclick="generateModule()">✨ GENERAR MÓDULO</button>
  </div>
  <div class="separator"></div>
  <div class="toolbar-group">
    <button class="btn btn-danger" onclick="deleteSelectedElements()">🗑 Eliminar selección</button>
    <button class="btn btn-primary" onclick="showSendModal()">✉ ENVIAR</button>
    <a href="index.html" class="btn">🏠 Volver</a>
  </div>
</div>

<div class="sidebar-left">
  <div class="grosor-info">📏 Aglomerado 15mm | Snapping automático</div>
  <div class="status-info" id="status-info">💡 Selección múltiple: Ctrl+Click</div>
  
  <div class="section">
    <div class="section-title">⚙️ SELECCIÓN</div>
    <div id="selected-info" style="color: #aaa; font-size: 12px; margin-bottom: 8px;">Ninguno</div>
    <div id="multi-count" style="color: #8bc34a; font-size: 10px; margin-bottom: 8px;"></div>
    <div id="transform-controls" style="display: none;">
      <div class="transform-controls">
        <div><label>X (cm)</label><input type="number" id="pos-x" class="transform-input" step="1" onchange="updateElementPosition()"></div>
        <div><label>Y (cm)</label><input type="number" id="pos-y" class="transform-input" step="1" onchange="updateElementPosition()"></div>
        <div><label>Z (cm)</label><input type="number" id="pos-z" class="transform-input" step="1" onchange="updateElementPosition()"></div>
        <div><label>Ancho (cm)</label><input type="number" id="size-x" class="transform-input" step="5" onchange="updateElementSize()"></div>
        <div><label>Alto (cm)</label><input type="number" id="size-y" class="transform-input" step="5" onchange="updateElementSize()"></div>
        <div><label>Fondo (cm)</label><input type="number" id="size-z" class="transform-input" step="5" onchange="updateElementSize()"></div>
      </div>
      <button class="btn btn-danger" style="width: 100%; margin-top: 8px;" onclick="deleteSelectedElements()">🗑 ELIMINAR SELECCIÓN</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">📊 RESUMEN</div>
    <div class="medidas-realtime">
      <div>Elementos: <span id="med-total">0</span></div>
      <div>Seleccionados: <span id="med-selected">0</span></div>
      <div>Módulos: <span id="med-modulos">0</span></div>
    </div>
  </div>
</div>

<div class="sidebar-right">
  <div class="section">
    <div class="section-title">📋 LISTA DE ELEMENTOS</div>
    <div class="element-list" id="elements-list"></div>
    <div style="margin-top:8px; font-size:9px; color:#666; text-align:center;">💡 Ctrl+Click = selección múltiple</div>
  </div>
  <div class="section">
    <div class="section-title">🎬 VISTAS</div>
    <button class="btn" style="width: 100%; margin-bottom: 5px;" onclick="setView('front')">◀ Frontal</button>
    <button class="btn" style="width: 100%; margin-bottom: 5px;" onclick="setView('side')">▶ Lateral</button>
    <button class="btn" style="width: 100%; margin-bottom: 5px;" onclick="setView('top')">▼ Superior</button>
    <button class="btn" style="width: 100%;" onclick="setView('iso')">● Isométrica</button>
  </div>
</div>

<div id="canvas-container"></div>
<div class="float-buttons">
  <div class="float-btn" onclick="setView('front')">◀</div>
  <div class="float-btn" onclick="setView('side')">▶</div>
  <div class="float-btn" onclick="setView('top')">▼</div>
  <div class="float-btn" onclick="setView('iso')">●</div>
  <div class="float-btn" onclick="resetView()">⟳</div>
</div>

<div id="sendModal" class="modal-overlay">
  <div class="modal-content">
    <h3 style="color:#C4A46B;">📧 Enviar diseño</h3>
    <input type="text" id="clientName" placeholder="Nombre completo *">
    <input type="tel" id="clientPhone" placeholder="Teléfono móvil *">
    <input type="email" id="clientEmail" placeholder="Correo (opcional)">
    <input type="text" id="clientAddress" placeholder="Dirección (opcional)">
    <textarea id="clientRequirement" rows="2" placeholder="¿Qué necesitas?"></textarea>
    <textarea id="clientNotes" rows="3" placeholder="Comentarios"></textarea>
    <div class="loading" id="loadingSpinner">📤 Enviando...</div>
    <div class="modal-buttons">
      <button class="btn-cancelar" onclick="closeSendModal()">Cancelar</button>
      <button class="btn-enviar" onclick="sendDesignToEmail()">Enviar</button>
    </div>
  </div>
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { TransformControls } from 'three/addons/controls/TransformControls.js';

  const GROSOR = 0.015;
  let scene, camera, renderer, controls, transformControls;
  let elementsGroup = new THREE.Group();
  let elements = [];
  let selectedElements = new Set();
  let nextId = 1;
  let moduloCount = 0;
  let nextModuleX = 0;

  const elementTypes = {
    lateral: { nombre: 'Lateral', icon: '🧱', color: 0xD4BC98, rotable: false, defaultSize: { w: GROSOR, h: 2.2, d: 0.6 } },
    piso: { nombre: 'Piso', icon: '📌', color: 0xD4BC98, rotable: false, defaultSize: { w: 2.0, h: GROSOR, d: 0.6 } },
    techo: { nombre: 'Techo', icon: '📌', color: 0xD4BC98, rotable: false, defaultSize: { w: 2.0, h: GROSOR, d: 0.6 } },
    espaldar: { nombre: 'Espaldar', icon: '📌', color: 0xD4BC98, rotable: false, defaultSize: { w: 2.0, h: 2.2, d: GROSOR } },
    puerta: { nombre: 'Puerta', icon: '🚪', color: 0xE8D8C4, rotable: true, defaultSize: { w: 0.9, h: 2.1, d: GROSOR } },
    tirador: { nombre: 'Tirador', icon: '🔘', color: 0xC4A46B, rotable: true, defaultSize: { w: 0.1, h: 0.02, d: 0.008 } },
    estante: { nombre: 'Estante', icon: '📦', color: 0xE8D8C4, rotable: true, defaultSize: { w: 1.6, h: GROSOR, d: 0.5 } }
  };

  function init() {
    const container = document.getElementById('canvas-container');
    const width = container.clientWidth;
    const height = container.clientHeight;
    
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);
    scene.fog = new THREE.Fog(0x1a1a1a, 10, 25);
    
    camera = new THREE.PerspectiveCamera(45, width/height, 0.1, 50);
    camera.position.set(4, 2, 4);
    
    renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(width, height);
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);
    
    controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1.2, 0);
    
    // Luces
    const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
    scene.add(ambientLight);
    const mainLight = new THREE.DirectionalLight(0xffffff, 1);
    mainLight.position.set(5, 8, 3);
    mainLight.castShadow = true;
    mainLight.shadow.mapSize.width = 1024;
    mainLight.shadow.mapSize.height = 1024;
    scene.add(mainLight);
    const fillLight = new THREE.PointLight(0x88aaff, 0.3);
    fillLight.position.set(-2, 2, 3);
    scene.add(fillLight);
    
    // Suelo
    const gridHelper = new THREE.GridHelper(12, 20, 0x555555, 0x333333);
    gridHelper.position.y = -0.02;
    scene.add(gridHelper);
    
    scene.add(elementsGroup);
    
    transformControls = new TransformControls(camera, renderer.domElement);
    transformControls.addEventListener('dragging-changed', (event) => { 
      controls.enabled = !event.value;
    });
    scene.add(transformControls);
    
    // Click para seleccionar
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    renderer.domElement.addEventListener('click', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left)/rect.width)*2 - 1;
      mouse.y = -((event.clientY - rect.top)/rect.height)*2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(elements.map(e => e.mesh));
      
      if (intersects.length > 0) {
        const element = elements.find(e => e.mesh === intersects[0].object);
        if (element) {
          if (event.ctrlKey) {
            if (selectedElements.has(element)) {
              selectedElements.delete(element);
            } else {
              selectedElements.add(element);
            }
          } else {
            selectedElements.clear();
            selectedElements.add(element);
          }
          updateSelectionDisplay();
        }
      } else if (!event.ctrlKey) {
        selectedElements.clear();
        updateSelectionDisplay();
      }
      updateUI();
    });
    
    // Crear un módulo de ejemplo para mostrar
    generateModule();
    
    animate();
    updateUI();
  }

  function updateSelectionDisplay() {
    if (selectedElements.size === 1) {
      const element = Array.from(selectedElements)[0];
      transformControls.attach(element.mesh);
      document.getElementById('transform-controls').style.display = 'block';
      const pos = element.mesh.position;
      const size = element.size;
      document.getElementById('pos-x').value = (pos.x*100).toFixed(1);
      document.getElementById('pos-y').value = (pos.y*100).toFixed(1);
      document.getElementById('pos-z').value = (pos.z*100).toFixed(1);
      document.getElementById('size-x').value = (size.width*100).toFixed(1);
      document.getElementById('size-y').value = (size.height*100).toFixed(1);
      document.getElementById('size-z').value = (size.depth*100).toFixed(1);
    } else {
      transformControls.detach();
      document.getElementById('transform-controls').style.display = 'none';
    }
    updateUI();
  }

  function clearSelection() {
    selectedElements.clear();
    updateSelectionDisplay();
  }

  function rotateSelected(degrees) {
    const rad = (degrees * Math.PI) / 180;
    selectedElements.forEach(el => {
      if (elementTypes[el.type]?.rotable) {
        el.mesh.rotation.y += rad;
      }
    });
    updateUI();
  }

  function editMultipleDimensions() {
    if (selectedElements.size === 0) {
      alert("Selecciona al menos un elemento (Ctrl+Click)");
      return;
    }
    
    const nuevoAncho = prompt("Nuevo ancho (cm):", "80");
    const nuevoAlto = prompt("Nuevo alto (cm):", "200");
    const nuevoFondo = prompt("Nuevo fondo (cm):", "60");
    
    selectedElements.forEach(el => {
      if (nuevoAncho && !isNaN(nuevoAncho)) {
        el.size.width = parseFloat(nuevoAncho) / 100;
      }
      if (nuevoAlto && !isNaN(nuevoAlto)) {
        el.size.height = parseFloat(nuevoAlto) / 100;
      }
      if (nuevoFondo && !isNaN(nuevoFondo)) {
        el.size.depth = parseFloat(nuevoFondo) / 100;
      }
      // Recrear mesh
      const oldPos = el.mesh.position.clone();
      const oldType = el.type;
      const oldId = el.id;
      const oldRot = el.mesh.rotation.y;
      
      elementsGroup.remove(el.mesh);
      const geometry = new THREE.BoxGeometry(el.size.width, el.size.height, el.size.depth);
      const material = new THREE.MeshStandardMaterial({ color: elementTypes[oldType].color, roughness: 0.6 });
      const newMesh = new THREE.Mesh(geometry, material);
      newMesh.position.set(oldPos.x, oldPos.y, oldPos.z);
      newMesh.rotation.y = oldRot;
      newMesh.castShadow = true;
      newMesh.userData = { id: oldId, type: oldType };
      elementsGroup.add(newMesh);
      el.mesh = newMesh;
    });
    
    if (selectedElements.size === 1) {
      updateSelectionDisplay();
    }
    updateUI();
  }

  function addElement(type) {
    const config = elementTypes[type];
    if (!config) return;
    
    const id = nextId++;
    const size = { ...config.defaultSize };
    let position;
    
    switch(type) {
      case 'lateral':
        position = { x: nextModuleX + 0.5, y: 1.1, z: 0 };
        break;
      case 'piso':
        position = { x: 0, y: GROSOR/2, z: 0 };
        break;
      case 'techo':
        position = { x: 0, y: 2.2 - GROSOR/2, z: 0 };
        break;
      case 'espaldar':
        position = { x: 0, y: 1.1, z: -0.6/2 + GROSOR/2 };
        break;
      case 'puerta':
        position = { x: -0.45, y: 1.05, z: 0.31 };
        break;
      case 'tirador':
        position = { x: -0.45, y: 1.1, z: 0.32 };
        const tiradorGeo = new THREE.CylinderGeometry(0.008, 0.008, size.w, 8);
        const tiradorMat = new THREE.MeshStandardMaterial({ color: config.color, metalness: 0.85 });
        const tiradorMesh = new THREE.Mesh(tiradorGeo, tiradorMat);
        tiradorMesh.rotation.z = Math.PI/2;
        tiradorMesh.position.set(position.x, position.y, position.z);
        tiradorMesh.castShadow = true;
        tiradorMesh.userData = { id, type };
        elementsGroup.add(tiradorMesh);
        elements.push({ id, type, mesh: tiradorMesh, position, size, rotation: 0 });
        updateUI();
        return;
      case 'estante':
        position = { x: 0, y: 1.2, z: 0 };
        break;
      default:
        position = { x: 0, y: 0, z: 0 };
    }
    
    const geometry = new THREE.BoxGeometry(size.w, size.h, size.d);
    const material = new THREE.MeshStandardMaterial({ color: config.color, roughness: 0.6 });
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.set(position.x, position.y, position.z);
    mesh.castShadow = true;
    mesh.userData = { id, type };
    elementsGroup.add(mesh);
    elements.push({ id, type, mesh, position, size, rotation: 0 });
    
    if (type === 'lateral') {
      nextModuleX = Math.max(nextModuleX, mesh.position.x + size.w/2);
    }
    
    updateUI();
  }

  function generateModule() {
    let ancho = parseFloat(prompt("Ancho del módulo (cm):", "80")) / 100;
    let alto = parseFloat(prompt("Alto del módulo (cm):", "200")) / 100;
    let fondo = parseFloat(prompt("Fondo del módulo (cm):", "60")) / 100;
    
    if (isNaN(ancho) || isNaN(alto) || isNaN(fondo)) return;
    
    const nuevaX = nextModuleX + (ancho / 2);
    const y = alto / 2;
    
    const addPieza = (type, pos, size) => {
      const id = nextId++;
      const geometry = new THREE.BoxGeometry(size.w, size.h, size.d);
      const material = new THREE.MeshStandardMaterial({ color: elementTypes[type].color, roughness: 0.6 });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.set(pos.x, pos.y, pos.z);
      mesh.castShadow = true;
      mesh.userData = { id, type };
      elementsGroup.add(mesh);
      elements.push({ id, type, mesh, position: pos, size, rotation: 0 });
    };
    
    // Lateral izquierdo
    addPieza('lateral', { x: nuevaX - ancho/2 + GROSOR/2, y: y, z: 0 }, { w: GROSOR, h: alto, d: fondo });
    // Lateral derecho
    addPieza('lateral', { x: nuevaX + ancho/2 - GROSOR/2, y: y, z: 0 }, { w: GROSOR, h: alto, d: fondo });
    // Piso
    addPieza('piso', { x: nuevaX, y: GROSOR/2, z: 0 }, { w: ancho, h: GROSOR, d: fondo });
    // Techo
    addPieza('techo', { x: nuevaX, y: alto - GROSOR/2, z: 0 }, { w: ancho, h: GROSOR, d: fondo });
    // Espaldar
    addPieza('espaldar', { x: nuevaX, y: alto/2, z: -fondo/2 + GROSOR/2 }, { w: ancho, h: alto, d: GROSOR });
    
    // Aplicar snapping: colocar laterales sobre el piso
    const laterales = elements.filter(e => e.type === 'lateral' && e.id >= nextId - 4);
    const pisos = elements.filter(e => e.type === 'piso');
    laterales.forEach(lat => {
      if (pisos.length > 0) {
        const pisoCercano = pisos.reduce((prev, curr) => {
          return Math.abs(curr.position.x - lat.position.x) < Math.abs(prev.position.x - lat.position.x) ? curr : prev;
        });
        lat.mesh.position.y = pisoCercano.position.y + GROSOR;
        lat.position.y = lat.mesh.position.y;
      }
    });
    
    nextModuleX = nuevaX + ancho/2;
    moduloCount++;
    updateUI();
    alert(`✅ Módulo #${moduloCount} creado\nDimensiones: ${(ancho*100).toFixed(0)} x ${(alto*100).toFixed(0)} x ${(fondo*100).toFixed(0)} cm`);
  }

  function deleteSelectedElements() {
    if (selectedElements.size === 0) return;
    selectedElements.forEach(el => {
      const idx = elements.findIndex(e => e.id === el.id);
      if (idx !== -1) {
        elementsGroup.remove(el.mesh);
        elements.splice(idx, 1);
      }
    });
    selectedElements.clear();
    updateSelectionDisplay();
    updateUI();
  }

  function updateElementPosition() {
    if (selectedElements.size !== 1) return;
    const element = Array.from(selectedElements)[0];
    element.mesh.position.set(
      parseFloat(document.getElementById('pos-x').value)/100,
      parseFloat(document.getElementById('pos-y').value)/100,
      parseFloat(document.getElementById('pos-z').value)/100
    );
    element.position = element.mesh.position.clone();
  }

  function updateElementSize() {
    if (selectedElements.size !== 1) return;
    const element = Array.from(selectedElements)[0];
    const w = parseFloat(document.getElementById('size-x').value)/100;
    const h = parseFloat(document.getElementById('size-y').value)/100;
    const d = parseFloat(document.getElementById('size-z').value)/100;
    
    const oldPos = element.mesh.position.clone();
    const oldType = element.type;
    const oldId = element.id;
    const idx = elements.findIndex(e => e.id === oldId);
    if (idx === -1) return;
    
    elementsGroup.remove(element.mesh);
    const geometry = new THREE.BoxGeometry(w, h, d);
    const material = new THREE.MeshStandardMaterial({ color: elementTypes[oldType].color, roughness: 0.6 });
    const newMesh = new THREE.Mesh(geometry, material);
    newMesh.position.set(oldPos.x, oldPos.y, oldPos.z);
    newMesh.castShadow = true;
    newMesh.userData = { id: oldId, type: oldType };
    elementsGroup.add(newMesh);
    
    element.mesh = newMesh;
    element.size = { width: w, height: h, depth: d };
    updateSelectionDisplay();
    updateUI();
  }

  function updateUI() {
    const container = document.getElementById('elements-list');
    container.innerHTML = '';
    elements.forEach(el => {
      const div = document.createElement('div');
      const isSelected = selectedElements.has(el);
      div.className = 'element-item' + (isSelected ? (selectedElements.size === 1 ? ' selected' : ' selected-multi') : '');
      const config = elementTypes[el.type];
      div.innerHTML = `<span>${config?.icon || '📦'} ${config?.nombre || el.type} #${el.id}</span><button class="btn" style="padding:2px 6px;" onclick="event.stopPropagation(); selectSingleElement(${el.id})">✏️</button>`;
      div.onclick = (e) => {
        if (e.ctrlKey) {
          if (selectedElements.has(el)) selectedElements.delete(el);
          else selectedElements.add(el);
          updateSelectionDisplay();
        } else {
          selectedElements.clear();
          selectedElements.add(el);
          updateSelectionDisplay();
        }
        updateUI();
      };
      container.appendChild(div);
    });
    
    document.getElementById('med-total').innerHTML = elements.length;
    document.getElementById('med-selected').innerHTML = selectedElements.size;
    document.getElementById('med-modulos').innerHTML = moduloCount;
    document.getElementById('multi-count').innerHTML = selectedElements.size > 1 ? `📌 ${selectedElements.size} elementos seleccionados` : '';
    
    const infoDiv = document.getElementById('selected-info');
    if (selectedElements.size === 1) {
      const el = Array.from(selectedElements)[0];
      infoDiv.innerHTML = `<div style="color:#C4A46B;">${elementTypes[el.type]?.nombre || el.type} #${el.id}</div>`;
    } else if (selectedElements.size > 1) {
      infoDiv.innerHTML = `<div style="color:#8bc34a;">${selectedElements.size} elementos seleccionados</div>`;
    } else {
      infoDiv.innerHTML = '<div style="color:#aaa;">Ninguno</div>';
    }
  }

  function selectSingleElement(id) {
    const el = elements.find(e => e.id === id);
    if (el) {
      selectedElements.clear();
      selectedElements.add(el);
      updateSelectionDisplay();
      updateUI();
    }
  }

  function setView(view) {
    const centro = nextModuleX / 2;
    switch(view) {
      case 'front': camera.position.set(centro, 1.5, 5); controls.target.set(centro, 1.2, 0); break;
      case 'side': camera.position.set(4, 1.5, 0); controls.target.set(centro, 1.2, 0); break;
      case 'top': camera.position.set(centro, 5, 0); controls.target.set(centro, 1.2, 0); break;
      case 'iso': camera.position.set(4, 2.5, 4); controls.target.set(centro, 1.2, 0); break;
    }
    controls.update();
  }

  function resetView() { setView('iso'); }

  function showSendModal() {
    if (elements.length === 0) { alert("❌ No hay elementos para enviar"); return; }
    document.getElementById('sendModal').classList.add('show');
  }
  function closeSendModal() { document.getElementById('sendModal').classList.remove('show'); }
  
  function sendDesignToEmail() {
    const nombre = document.getElementById('clientName').value.trim();
    const telefono = document.getElementById('clientPhone').value.trim();
    if (!nombre || !telefono) { alert("❌ Nombre y teléfono requeridos"); return; }
    
    document.getElementById('loadingSpinner').style.display = 'block';
    renderer.render(scene, camera);
    
    setTimeout(() => {
      const img = renderer.domElement.toDataURL('image/png');
      let lista = "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n📋 LISTA DE PIEZAS\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n";
      elements.forEach(e => {
        lista += `${elementTypes[e.type]?.nombre || e.type}: ${(e.size.width*100).toFixed(0)}x${(e.size.height*100).toFixed(0)}x${(e.size.depth*100).toFixed(0)} cm\n`;
      });
      const datos = `\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n👤 DATOS DEL CLIENTE\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\nNombre: ${nombre}\nTeléfono: ${telefono}\nEmail: ${document.getElementById('clientEmail').value || "No"}\nDirección: ${document.getElementById('clientAddress').value || "No"}\n\n📋 Requiere: ${document.getElementById('clientRequirement').value || "No"}\n\n💬 Comentarios: ${document.getElementById('clientNotes').value || "Ninguno"}`;
      
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = 'https://formsubmit.co/miguel_716@hotmail.com';
      form.style.display = 'none';
      
      const campos = [
        { n: 'name', v: nombre },
        { n: 'email', v: document.getElementById('clientEmail').value || 'cliente@email.com' },
        { n: '_subject', v: `DISEÑO 3D - ${nombre}` },
        { n: 'message', v: lista + datos },
        { n: '_captcha', v: 'false' },
        { n: '_template', v: 'table' }
      ];
      campos.forEach(c => { const i = document.createElement('input'); i.type = 'hidden'; i.name = c.n; i.value = c.v; form.appendChild(i); });
      
      fetch(img).then(r => r.blob()).then(b => {
        const f = new File([b], `diseno_${nombre.replace(/\s/g,'_')}.png`, { type: 'image/png' });
        const inp = document.createElement('input');
        inp.type = 'file';
        inp.name = 'attachment';
        const dt = new DataTransfer();
        dt.items.add(f);
        inp.files = dt.files;
        form.appendChild(inp);
        document.body.appendChild(form);
        form.submit();
        
        setTimeout(() => {
          document.getElementById('loadingSpinner').style.display = 'none';
          closeSendModal();
          alert("✅ Diseño enviado a CR Design");
          document.getElementById('clientName').value = '';
          document.getElementById('clientPhone').value = '';
          document.getElementById('clientEmail').value = '';
          document.getElementById('clientAddress').value = '';
          document.getElementById('clientRequirement').value = '';
          document.getElementById('clientNotes').value = '';
        }, 2000);
      });
    }, 200);
  }

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }

  window.addElement = addElement;
  window.generateModule = generateModule;
  window.rotateSelected = rotateSelected;
  window.clearSelection = clearSelection;
  window.editMultipleDimensions = editMultipleDimensions;
  window.deleteSelectedElements = deleteSelectedElements;
  window.updateElementPosition = updateElementPosition;
  window.updateElementSize = updateElementSize;
  window.selectSingleElement = selectSingleElement;
  window.setView = setView;
  window.resetView = resetView;
  window.showSendModal = showSendModal;
  window.closeSendModal = closeSendModal;
  window.sendDesignToEmail = sendDesignToEmail;

  init();
  window.addEventListener('resize', () => {
    const w = document.getElementById('canvas-container').clientWidth;
    const h = document.getElementById('canvas-container').clientHeight;
    camera.aspect = w/h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
</script>
</body>
</html>
